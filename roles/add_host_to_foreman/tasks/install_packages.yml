---
- name: Install packages via DNF/YUM
  ansible.builtin.dnf:
    name: "{{ ahtf_install_packages.dnf }}"
    state: present
    update_cache: yes
  when: ansible_pkg_mgr in ['dnf', 'yum']

- name: Enable and start services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ ahtf_services }}"
