---
# Название пакета, для которого хотим получить информацию. Указывается регулярное выражение для поиска
ghi_package_name_regex:
  - ^postgres
  - ^mysql
  - ^mariadb
  - ^mongodb
  - ^redis
  - ^memcached
  - ^sqlite
  - ^cassandra
  - ^couchdb
  - ^neo4j
  - ^influxdb
  - ^clickhouse
  - ^elasticsearch
  - ^opensearch
  - ^cockroachdb
  - ^timescaledb

# Файл .csv, в котором собрана найденная информация. Сохраняется на хосте, откуда запускается Ansible
ghi_file_info_path: "./file_info_{{ ghi_timestamp }}.csv"
