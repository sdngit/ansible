---
- name: Set a hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
    use: systemd
  register: daldc_result_set_hostname

- name: Set a machine-id and create new SSH key
  when: daldc_result_set_hostname.changed # noqa: no-handler
  block:
    - name: Set a hostname /etc/sysconfig/network
      ansible.builtin.lineinfile:
        path: /etc/sysconfig/network
        regexp: '^HOSTNAME='
        line: "HOSTNAME={{ inventory_hostname }}"

    - name: Set a hostname /etc/alterator/dhcp/general
      ansible.builtin.lineinfile:
        path: /etc/alterator/dhcp/general
        regexp: '^client_search='
        line: "client_search={{ inventory_hostname }}"

    - name: Set a hostname /etc/alterator/dhcp6/general
      ansible.builtin.lineinfile:
        path: /etc/alterator/dhcp6/general
        regexp: '^client_search='
        line: "client_search={{ inventory_hostname }}"

    - name: Delete a machine-id
      ansible.builtin.copy:
        dest: /etc/machine-id
        content: ""

    - name: Delete a machine-id for Altlinux
      ansible.builtin.copy:
        dest: /var/lib/dbus/machine-id
        content: ""
      when: ansible_distribution == "Altlinux"

    - name: Create new a machine-id
      ansible.builtin.command: systemd-machine-id-setup

    - name: Copy machine-id to /var/lib/dbus/machine-id for Altlinux
      ansible.builtin.copy:
        src: /etc/machine-id
        dest: /var/lib/dbus/machine-id
        remote_src: yes
      when: ansible_distribution == "Altlinux"

    - name: Remove old host SSH-keys
      ansible.builtin.shell: rm -rf /etc/ssh/ssh_host_*

    - name: Remove old host SSH-keys for Altlinux
      ansible.builtin.shell: rm -rf /etc/ssh/ssh_host_*
      when: ansible_distribution == "Altlinux"

    - name: Restart sshd.servie
      ansible.builtin.service:
        name: sshd
        state: restarted

    - name: Reboot host
      ansible.builtin.reboot:
        reboot_timeout: 300

- name: Set DNS
  ansible.builtin.template:
    src: templates/resolv.conf.j2
    dest: "/etc/net/ifaces/{{ daldc_net_ifaces }}/resolv.conf"
    owner: root
    group: root
    mode: '0644'
  register: daldc_result_set_dns

- name: Set resolvconf
  ansible.builtin.lineinfile:
    path: /etc/resolvconf.conf
    regexp: '^name_servers='
    line: name_servers=127.0.0.1
  register: daldc_result_set_resolvconf
  when: daldc_create_domain | bool == true

- name: Restart NetworkManager
  ansible.builtin.service:
    name: NetworkManager
    state: restarted
  when: >
    daldc_result_set_dns.changed
    or daldc_result_set_resolvconf.changed

- name: Update DNS
  ansible.builtin.command: resolvconf -u
  when: >
    daldc_result_set_dns.changed
    or daldc_result_set_resolvconf.changed

- name: Generate SSH keypair for root
  community.crypto.openssh_keypair:
    path: /root/.ssh/id_ed25519
    type: ed25519
    owner: root
